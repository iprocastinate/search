services:
  - type: web
    name: telegram-index-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PORT
        value: 8080
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: REQUEST_CHANNEL_ID
        sync: false
      - key: MONGO_URI
        sync: false
